protocol: protocol_v11_visionfm_crossfamily_evaluation
data_root: D:/ryjin/fwi_visionfm/data
output_root: outputs/protocol_v11_visionfm_crossfamily
device: cpu
metric_space: physical_velocity
train_size: 100
val_size: 50
in_family_test_size: 50
cross_family_test_size: 50
epochs: 2
seeds: [0, 1, 2]
shot_count: 5
velocity_shape: [70, 70]
image_size: 224
batch_size: 2
learning_rate: 0.001
aggregation: mean
decoder: common_bounded_velocity_decoder
decoder_base_channels: 16
loss: default_l1
normalization: source_train_only
target_test_usage: evaluation_only
families:
  flatvel_a: flatvel_a_subset2k
  curvevel_a: curvevel_a_subset500
  flatfault_a: flatfault_a_subset500
transfers:
  - [flatvel_a, curvevel_a]
  - [flatvel_a, flatfault_a]
  - [curvevel_a, flatfault_a]
bridges:
  raw_envelope_spectrum3:
    image_size: 224
    norm_mode: zscore
    channels: [raw, envelope, spectrum]
  spectrogram_multiband:
    image_size: 224
    norm_mode: zscore
    n_fft: 64
    hop_length: 16
    win_length: 64
    power: 1.0
backbones:
  dinov2_model_name: vit_small_patch14_dinov2.lvd142m
  dinov2_backbone_type: timm
  ncs_repo: D:/ryjin/fwi_visionfm/external/ncs_models
  ncs_2d_weights: D:/ryjin/fwi_visionfm/weights/ncs/NCS-v1-2d-base
  ncs_feature_mode: mean_patch
  lora_rank: 4
  lora_alpha: 8.0
  lora_dropout: 0.0
strict_exclusions:
  boundary_auxiliary: false
  geometry_embedding: false
  fusion: false

